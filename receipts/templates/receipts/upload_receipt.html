{% extends 'base.html' %}

{% block content %}
    <h2>Upload Receipt</h2>
    <form method="post" enctype="multipart/form-data" id="upload-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_image">Receipt Image:</label>
            <input type="file" name="image" id="id_image" accept="image/*" capture="environment" class="form-control-file">
            <small class="form-text text-muted">You can take a photo directly or select from your gallery.</small>
        </div>
        <div class="form-group">
            <label for="id_category">Category:</label>
            {{ form.category }}
        </div>
        {% if is_superuser %}
            <div class="form-group">
                <label for="id_user">User:</label>
                {{ form.user }}
            </div>
        {% endif %}
        <button type="submit" class="btn btn-primary" id="upload-button">Upload</button>
        <div id="loading-spinner" class="spinner-border text-primary" role="status" style="display:none;">
            <span class="sr-only">Loading...</span>
        </div>
    </form>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        $('#upload-form').on('submit', function() {
            $('#upload-button').prop('disabled', true);
            $('#loading-spinner').show();
        });
    });
</script>
{% endblock extra_js %}
