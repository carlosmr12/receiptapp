{% extends 'base.html' %}

{% block content %}
    <h2>Upload Receipt</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_image">Receipt Image:</label>
            <input type="file" name="image" id="id_image" accept="image/*" capture="environment" class="form-control-file">
            <small class="form-text text-muted">You can take a photo directly or select from your gallery.</small>
        </div>
        <div class="form-group">
            <label for="id_category">Category:</label>
            {{ form.category }}
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>
{% endblock %}
