{% extends 'base.html' %}

{% block content %}
    <h2>Expense Dashboard</h2>

    <form method="get" class="mb-4" id="filter-form">
        <div class="form-row align-items-center">
            <div class="col-auto">
                <label class="sr-only" for="start-date">Start Date</label>
                <input type="date" class="form-control mb-2" id="start-date" name="start_date" placeholder="Start Date" value="{{ request.GET.start_date|default:'' }}">
            </div>
            <div class="col-auto">
                <label class="sr-only" for="end-date">End Date</label>
                <input type="date" class="form-control mb-2" id="end-date" name="end_date" placeholder="End Date" value="{{ request.GET.end_date|default:'' }}">
            </div>
            {% if request.user.is_superuser %}
            <div class="col-auto">
                <label class="sr-only" for="user-select">Users</label>
                <select multiple class="form-control mb-2" id="user-select" name="users">
                    <option value="all" {% if not selected_user_ids %}selected{% endif %}>All Users</option>
                    {% for user_obj in all_users %}
                        <option value="{{ user_obj.id }}" {% if user_obj.id in selected_user_ids %}selected{% endif %}>{{ user_obj.username }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="col-auto">
                <button type="submit" class="btn btn-primary mb-2">Apply Filters</button>
            </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-6">
            {{ pie_chart|safe }}
        </div>
        <div class="col-md-6">
            {{ bar_chart|safe }}
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <h3>Ask your Receipts</h3>
            <form id="chat-form" method="post" action="{% url 'chat_with_llm' %}" class="mb-3">
                {% csrf_token %}
                <div class="form-group">
                    <label for="llm-question">What would you like to know?</label>
                    <input type="text" class="form-control" id="llm-question" name="question" placeholder="e.g., How much did I spend on coffee last month?">
                </div>
                <button type="submit" class="btn btn-info">Ask AI</button>
            </form>
            <div id="llm-response-container" class="card mt-3" style="display: none;">
                <div class="card-header">AI Response</div>
                <div class="card-body">
                    <p class="card-text" id="llm-response-text"></p>
                </div>
            </div>
        </div>
    </div>

{% endblock %}

{% block extra_js %}
    <script>
        $(document).ready(function() {
            $('#chat-form').on('submit', function(e) {
                console.log("Chat form submitted!");
                e.preventDefault(); // Prevent default form submission

                var form = $(this);
                var question = $('#llm-question').val();
                var csrfToken = $('[name=csrfmiddlewaretoken]').val();
                var responseContainer = $('#llm-response-container');
                var responseText = $('#llm-response-text');

                responseText.text('Asking AI...');
                responseContainer.show();

                $.ajax({
                    url: form.attr('action'),
                    type: form.attr('method'),
                    data: {
                        question: question,
                        csrfmiddlewaretoken: csrfToken
                    },
                    success: function(response) {
                        if (response.llm_response) {
                            responseText.html(response.llm_response); // Use .html() to render potential HTML/Markdown
                        } else {
                            responseText.text('No response from AI.');
                        }
                    },
                    error: function(xhr, status, error) {
                        responseText.text('Error: Could not get response from AI.');
                        console.error("AJAX Error: ", status, error, xhr.responseText);
                    }
                });

                return false; // Crucial: prevent default and stop propagation
            });
        });
    </script>
{% endblock extra_js %}
