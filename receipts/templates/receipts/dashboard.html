{% extends 'base.html' %}

{% block content %}
    <h2>Expense Dashboard</h2>

    <form method="get" class="mb-4">
        <div class="form-row align-items-center">
            <div class="col-auto">
                <label class="sr-only" for="period-select">Period</label>
                <select class="form-control mb-2" id="period-select" name="period">
                    <option value="all_time" {% if selected_period == 'all_time' %}selected{% endif %}>All Time</option>
                    <option value="last_7_days" {% if selected_period == 'last_7_days' %}selected{% endif %}>Last 7 Days</option>
                    <option value="last_30_days" {% if selected_period == 'last_30_days' %}selected{% endif %}>Last 30 Days</option>
                    <option value="this_month" {% if selected_period == 'this_month' %}selected{% endif %}>This Month</option>
                    <option value="this_year" {% if selected_period == 'this_year' %}selected{% endif %}>This Year</option>
                </select>
            </div>
            {% if request.user.is_superuser %}
            <div class="col-auto">
                <label class="sr-only" for="user-select">Users</label>
                <select multiple class="form-control mb-2" id="user-select" name="users">
                    <option value="all" {% if not selected_user_ids %}selected{% endif %}>All Users</option>
                    {% for user_obj in all_users %}
                        <option value="{{ user_obj.id }}" {% if user_obj.id in selected_user_ids %}selected{% endif %}>{{ user_obj.username }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="col-auto">
                <button type="submit" class="btn btn-primary mb-2">Apply Filters</button>
            </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-6">
            {{ pie_chart|safe }}
        </div>
        <div class="col-md-6">
            {{ bar_chart|safe }}
        </div>
    </div>
{% endblock %}
