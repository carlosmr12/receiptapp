name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SERVICE_NAME: receiptapp
  REGION: australia-southeast2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Google Auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "DEBUG=False" \
            --set-secrets=SECRET_KEY=receiptapp-secret-key:latest,DATABASE_URL=receiptapp-db-url:latest,GS_BUCKET_NAME=receiptapp-gs-bucket-name:latest,OPENROUTER_API_KEY=receiptapp-openrouter-api-key:latest,OPENROUTER_MODEL=receiptapp-openrouter-model:latest \
            --add-cloudsql-instances ${{ secrets.GCP_SQL_INSTANCE_NAME }}

      - name: Set SERVICE_URL output
        run: echo "SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')" >> $GITHUB_ENV

      - name: Update service with SERVICE_URL
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --update-env-vars "SERVICE_URL=${{ env.SERVICE_URL }},CUSTOM_DOMAIN=${{ secrets.CUSTOM_DOMAIN }}"

      - name: Run Django Migrations
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --update-env-vars "IS_MIGRATING=true"
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --remove-env-vars "IS_MIGRATING"

      - name: Collect Static Files
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --update-env-vars "IS_COLLECTING_STATIC=true"
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --remove-env-vars "IS_COLLECTING_STATIC"
