name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SERVICE_NAME: receiptapp
  REGION: australia-southeast2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Google Auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "DEBUG=False,CUSTOM_DOMAIN=${{ secrets.CUSTOM_DOMAIN }}" \
            --set-secrets=SECRET_KEY=receiptapp-secret-key:latest,DATABASE_URL=receiptapp-db-url:latest,GS_BUCKET_NAME=receiptapp-gs-bucket-name:latest,OPENROUTER_API_KEY=receiptapp-openrouter-api-key:latest,OPENROUTER_MODEL=receiptapp-openrouter-model:latest \
            --add-cloudsql-instances ${{ secrets.GCP_SQL_INSTANCE_NAME }}

      - name: Run Django Management Commands
        run: |
          # Install dependencies on the runner
          pip install -r requirements.txt

          # Download and start Cloud SQL Auth Proxy
          wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64 -O cloud-sql-proxy
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy ${{ secrets.GCP_SQL_INSTANCE_NAME }} &
          PROXY_PID=$!
          sleep 5 # Give proxy time to start

          # Fetch secrets from GCP Secret Manager and export them for this step
          export SECRET_KEY=$(gcloud secrets versions access latest --secret="receiptapp-secret-key")
          export DATABASE_URL=$(gcloud secrets versions access latest --secret="receiptapp-db-url")
          export GS_BUCKET_NAME=$(gcloud secrets versions access latest --secret="receiptapp-gs-bucket-name")
          export OPENROUTER_API_KEY=$(gcloud secrets versions access latest --secret="receiptapp-openrouter-api-key")
          export OPENROUTER_MODEL=$(gcloud secrets versions access latest --secret="receiptapp-openrouter-model")
          export DEBUG=False
          export CUSTOM_DOMAIN=${{ secrets.CUSTOM_DOMAIN }}

          # Set the PROXY_RUN flag and run management commands
          echo "Running Django Migrations..."
          PROXY_RUN=true python manage.py migrate

          echo "Collecting Static Files..."
          PROXY_RUN=true python manage.py collectstatic --noinput

          # Stop the proxy
          kill $PROXY_PID